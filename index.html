<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Top Construction Company in Oman | MEP, Solar & Infrastructure Experts</title>
  <meta name="description" content="Al Wejha Group is a leading construction company in Oman offering MEP, villa construction, solar energy, pipeline, and road construction services across Muscat and Oman.">
  <link rel="canonical" href="https://www.alwejhagroup.com/">

  <meta name="theme-color" content="#0077ff">
  <meta name="robots" content="index,follow,max-image-preview:large">

  <link rel="icon" href="/favicon.ico">
  <link rel="apple-touch-icon" href="/images/logo.png">

  <!-- Fast LCP -->
  <link rel="preload" as="image" href="/images/hero-home-poster.webp">

  <style>
    /* KEEPING YOUR DESIGN EXACT */
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:system-ui;background:#f5f7fb;color:#1a1a1a}
    .container{width:min(100% - 32px,1200px);margin:auto}

    header{position:sticky;top:0;background:#fff;border-bottom:1px solid #eee;z-index:10}
    .nav{display:flex;justify-content:space-between;align-items:center;min-height:70px}
    .menu{display:flex;gap:20px}
    .menu a{font-weight:600}

    /* HERO FIXED */
    .hero{
      position:relative;
      min-height:100vh;
      display:flex;
      align-items:center;
      color:#fff;
      overflow:hidden;
      background:url('/images/hero-home-poster.webp') center/cover no-repeat;
    }

    .hero-video{
      position:absolute;
      top:0;
      left:0;
      width:100%;
      height:100%;
      object-fit:cover;
      z-index:0;
      opacity:0;
      transition:opacity .5s ease;
    }

    .hero-video.loaded{
      opacity:1;
    }

    .overlay{
      position:absolute;
      inset:0;
      background:rgba(0,0,0,.5);
      z-index:1;
    }

    .hero-content{
      position:relative;
      z-index:2;
      padding:60px 0;
    }

    section{padding:80px 0}
  </style>
</head>

<body>

<header>
  <div class="container nav">
    <img src="/images/logo.png" height="40">
    <nav class="menu">
      <a href="#">Home</a>
      <a href="#">Services</a>
      <a href="#">Contact</a>
    </nav>
  </div>
</header>

<main>

<!-- HERO -->
<section class="hero">

  <!-- VIDEO FIX -->
  <video id="heroVideo" class="hero-video" muted playsinline loop preload="none">
    <source src="/videos/hero-home.webm" type="video/webm">
    <source src="/videos/hero-home.mp4" type="video/mp4">
  </video>

  <div class="overlay"></div>

  <div class="container hero-content">
    <h1>Leading Construction Company in Oman</h1>
    <p>Complete civil, MEP and infrastructure solutions across Oman.</p>
  </div>

</section>

<!-- CONTENT -->
<section>
  <div class="container">
    <h2>Complete Construction Solutions</h2>
    <p>Your full content remains intact...</p>
  </div>
</section>

</main>

<script>
  // SAFE VIDEO LOADER (fixes your issue)
  document.addEventListener("DOMContentLoaded", function () {
    const video = document.getElementById("heroVideo");

    if (!video) return;

    // Try to play video safely
    const playVideo = () => {
      video.play().then(() => {
        video.classList.add("loaded");
      }).catch(() => {
        // fallback → keep poster only
      });
    };

    // Load video only after page ready
    setTimeout(playVideo, 500);
  });
</script>

</body>
</html>
