<body>

<!-- KEEP YOUR EXISTING HTML EXACTLY SAME -->

<!-- HERO VIDEO FIXED -->
<section class="hero">
<div class="hero-media">

<video 
class="hero-video"
poster="/images/hero-home-poster.webp"
muted
playsinline
loop
preload="none"
disablePictureInPicture
>
<source data-src="/videos/hero-home.webm" type="video/webm">
<source data-src="/videos/hero-home.mp4" type="video/mp4">
</video>

</div>
</section>

<!-- KEEP REST OF YOUR HTML SAME -->

<!-- ✅ VIDEO + PERFORMANCE SCRIPT -->
<script>
(function () {
  const video = document.querySelector('.hero-video');
  if (!video) return;

  // ❌ Disable video on mobile (huge boost)
  if (window.innerWidth < 768) return;

  const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if (reduceMotion) return;

  const loadVideo = () => {
    const sources = video.querySelectorAll('source[data-src]');
    sources.forEach((source) => {
      if (!source.src) source.src = source.dataset.src;
    });

    video.load();

    video.play().catch(() => {});

    video.classList.add('is-ready');
  };

  // Lazy load when visible
  if ('IntersectionObserver' in window) {
    const observer = new IntersectionObserver((entries) => {
      if (entries.some(entry => entry.isIntersecting)) {
        loadVideo();
        observer.disconnect();
      }
    }, { threshold: 0.2 });

    observer.observe(video);
  } else {
    loadVideo();
  }
})();
</script>

<!-- ✅ DELAY ALL THIRD-PARTY SCRIPTS -->
<script>
function loadDelayedScripts() {
  document.querySelectorAll('script[data-delay]').forEach(el => {
    const s = document.createElement('script');
    s.src = el.dataset.src;
    s.defer = true;
    document.body.appendChild(s);
  });
}

// Load only after user interaction
['scroll','mousemove','touchstart'].forEach(event => {
  window.addEventListener(event, loadDelayedScripts, { once: true });
});
</script>

</body>
